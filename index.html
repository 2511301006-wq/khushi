<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Google Antigravity Quiz – A playful, gravity-defying quiz experience across Science, Math, History, Geography, and Computer Science.">
  <title>AntiGravity Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-landing" data-page="landing">

  <!-- Floating background elements -->
  <div class="floating-elements">
    <div class="floating-el"></div>
    <div class="floating-el"></div>
    <div class="floating-el"></div>
    <div class="floating-el"></div>
    <div class="floating-el"></div>
    <div class="floating-el"></div>
  </div>

  <!-- Main Content -->
  <div class="page-wrapper">
    <div class="container text-center">

      <!-- Animated Logo -->
      <h1 class="antigravity-logo" data-text="AntiGravity">AntiGravity</h1>
      <p class="subtitle">A gravity-defying quiz experience</p>

      <!-- Floating info cards -->
      <div style="display:flex; justify-content:center; gap:1.5rem; flex-wrap:wrap; margin-bottom:2.5rem;">
        <div class="glass-card" style="padding:1rem 1.5rem; animation: float 5s ease-in-out infinite;">
          <span style="font-size:1.8rem;">🔬</span>
          <p style="font-size:0.85rem; color:var(--text-secondary); margin-top:0.3rem;">5 Subjects</p>
        </div>
        <div class="glass-card" style="padding:1rem 1.5rem; animation: float 6s ease-in-out infinite 0.5s;">
          <span style="font-size:1.8rem;">❓</span>
          <p style="font-size:0.85rem; color:var(--text-secondary); margin-top:0.3rem;">25 Questions</p>
        </div>
        <div class="glass-card" style="padding:1rem 1.5rem; animation: float 5.5s ease-in-out infinite 1s;">
          <span style="font-size:1.8rem;">🏆</span>
          <p style="font-size:0.85rem; color:var(--text-secondary); margin-top:0.3rem;">Track Scores</p>
        </div>
      </div>

      <!-- CTA Buttons -->
      <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
        <a href="instructions.html" class="btn btn-primary btn-lg" style="animation: slideUp 0.8s ease-out 0.6s both;">
          Start Quiz 🚀
        </a>
        <a href="subjects.html" class="btn btn-secondary btn-lg" style="animation: slideUp 0.8s ease-out 0.8s both;">
          Pick Subject
        </a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>Built with ❤️ &amp; zero gravity</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
