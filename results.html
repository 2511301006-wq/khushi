<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Quiz Results – See your subject-wise scores and performance in the AntiGravity Quiz.">
    <title>Results – AntiGravity Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-landing" data-page="results">

    <!-- Floating background -->
    <div class="floating-elements">
        <div class="floating-el"></div>
        <div class="floating-el"></div>
        <div class="floating-el"></div>
        <div class="floating-el"></div>
        <div class="floating-el"></div>
    </div>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <a href="index.html" class="nav-brand">
            <span class="g">A</span><span class="a1">n</span><span class="q">t</span><span class="u">i</span><span
                class="i">G</span><span class="z">Q</span>
        </a>
        <a href="subjects.html" class="back-btn">← Subjects</a>
    </nav>

    <!-- Content -->
    <div class="page-wrapper" style="padding-top: 80px;">
        <div class="container">

            <h1
                style="font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; text-align: center; margin-bottom: 0.5rem; animation: slideUp 0.5s ease-out both;">
                📊 Your Results
            </h1>
            <p class="subtitle" id="result-message">Loading your scores...</p>

            <!-- Total Score Circle -->
            <div class="total-score-section">
                <div class="score-circle" id="score-circle">
                    <span class="big-score" id="total-score">0</span>
                    <span class="score-label">out of <span id="total-max">25</span></span>
                </div>
            </div>

            <!-- Subject-wise score cards -->
            <h2
                style="text-align:center; font-size: 1.2rem; font-weight: 600; color: var(--text-secondary); margin-bottom: var(--space-lg);">
                Subject Breakdown
            </h2>
            <div class="results-grid" id="results-grid">
                <!-- Populated by JavaScript -->
            </div>

            <!-- Actions -->
            <div
                style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: var(--space-2xl);">
                <a href="subjects.html" class="btn btn-primary">Take More Quizzes 🎯</a>
                <a href="summary.html" class="btn btn-success">Final Summary 🏆</a>
            </div>

        </div>
    </div>

    <footer class="footer">
        <span>Built with ❤️ &amp; zero gravity</span>
    </footer>

    <script src="script.js"></script>
</body>

</html>
